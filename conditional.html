<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional</title>
</head>
<body>
    <script>
        var x=20;
        if(x>60){
            document.write("x is greater than 10");
        }
        else{
            document.write("x is small");
        }
    </script>
    
</body>
