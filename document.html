<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" placeholder="enter your name" id="name">
    <button onclick="aiml()">click
    </button>
    <script>
        function aiml(){
            var x=document.getElementById("name").value;
            document.write(x);
        }
        aiml();
    </script>
</body>
</html>
